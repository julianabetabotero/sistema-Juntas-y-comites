# Instala LibreOffice (headless) para convertir DOCX/XLSX/PPTX a PDF y poder
# aplicarles la marca de agua dinámica. Se agrega vía apt sin tocar la detección
# de Node de Nixpacks.
[phases.setup]
aptPkgs = [
  "libreoffice-writer",
  "libreoffice-calc",
  "libreoffice-impress",
  "fonts-liberation",
]
